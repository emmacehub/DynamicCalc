  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="top">
    <button class="menuBtn" onclick="toggleMenu()">☰</button>
    <h2>Calculator</h2>
  </div>

  <!-- DISPLAY -->
  <input id="display" disabled>

  <!-- BUTTONS -->
  <div class="buttons">

    <!-- FIRST ROW (CONTROL ROW) -->
    <button onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">DEL</button>
    <button onclick="resetApp()" class="dynamicBtn">DYN</button>
    <button onclick="append('/')">/</button>

    <!-- SECOND ROW -->
    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('*')">*</button>

    <!-- THIRD ROW -->
    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('-')">-</button>

    <!-- FOURTH ROW -->
    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('+')">+</button>

    <!-- FIFTH ROW -->
    <button onclick="append('0')" class="zero">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="calculate()">=</button>

  </div>

  <!-- SIDE MENU -->
  <div id="sideMenu" class="sideMenu">

    <h3>Menu</h3>

    <button onclick="toggleTheme()">🌓 Theme</button>

    <button onclick="showHistory()">📜 History</button>

    <div id="historyBox"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>

<audio id="clickSound" src="https://www.fesliyanstudios.com/play-mp3/387" preload="auto"></audio>
    <script  src="./script.js"></script>

  </body>
  
</html>
